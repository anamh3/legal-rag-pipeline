<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Legal RAG — Hallucination-Aware Search</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg-primary: #08090c;
    --bg-secondary: #0f1117;
    --bg-card: #13151c;
    --bg-card-hover: #181b24;
    --bg-input: #0f1117;
    --border: #1e2130;
    --border-active: #2d3250;
    --text-primary: #e8e9ed;
    --text-secondary: #8b8fa3;
    --text-muted: #565a6e;
    --accent: #6c8cff;
    --accent-dim: #2a3560;
    --green: #3dd68c;
    --green-dim: #0d2a1a;
    --green-bg: #0a1f14;
    --yellow: #f0c246;
    --yellow-dim: #2a2510;
    --yellow-bg: #1a1a0a;
    --red: #f06c6c;
    --red-dim: #2a1010;
    --red-bg: #1a0a0a;
    --orange: #e8944c;
    --font-display: 'DM Serif Display', serif;
    --font-body: 'IBM Plex Sans', -apple-system, sans-serif;
    --font-mono: 'IBM Plex Mono', 'Cascadia Code', monospace;
    --radius: 8px;
    --radius-lg: 12px;
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    background: var(--bg-primary);
    color: var(--text-primary);
    font-family: var(--font-body);
    font-size: 14px;
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
  }

  /* ── Layout ─────────────────────────────────── */
  .app-layout {
    display: grid;
    grid-template-columns: 280px 1fr;
    min-height: 100vh;
  }

  @media (max-width: 900px) {
    .app-layout { grid-template-columns: 1fr; }
    .sidebar { display: none; }
  }

  /* ── Sidebar ────────────────────────────────── */
  .sidebar {
    background: var(--bg-secondary);
    border-right: 1px solid var(--border);
    padding: 24px 16px;
    display: flex;
    flex-direction: column;
    overflow-y: auto;
    max-height: 100vh;
    position: sticky;
    top: 0;
  }

  .sidebar-logo {
    font-family: var(--font-display);
    font-size: 20px;
    color: var(--text-primary);
    margin-bottom: 4px;
    letter-spacing: -0.3px;
  }

  .sidebar-sub {
    font-size: 11px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 24px;
    padding-bottom: 16px;
    border-bottom: 1px solid var(--border);
  }

  .sidebar-section-title {
    font-size: 10px;
    font-weight: 700;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 1.2px;
    margin: 20px 0 10px;
  }

  .history-item {
    padding: 10px 12px;
    border-radius: var(--radius);
    cursor: pointer;
    margin-bottom: 4px;
    transition: background 0.15s;
    border: 1px solid transparent;
  }
  .history-item:hover {
    background: var(--bg-card);
    border-color: var(--border);
  }
  .history-question {
    font-size: 12px;
    color: var(--text-primary);
    font-weight: 500;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
    margin-bottom: 4px;
  }
  .history-meta {
    font-size: 10px;
    color: var(--text-muted);
    font-family: var(--font-mono);
    display: flex;
    gap: 8px;
    align-items: center;
  }
  .history-score {
    display: inline-flex;
    align-items: center;
    gap: 3px;
  }
  .history-score-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
  }
  .history-empty {
    color: var(--text-muted);
    font-size: 12px;
    text-align: center;
    padding: 20px 0;
    font-style: italic;
  }

  .sidebar-footer {
    margin-top: auto;
    padding-top: 16px;
    border-top: 1px solid var(--border);
    font-size: 10px;
    color: var(--text-muted);
    line-height: 1.8;
  }
  .sidebar-footer a { color: var(--accent); text-decoration: none; }

  .tech-badges {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
    margin-top: 8px;
  }
  .tech-badge {
    font-size: 9px;
    font-weight: 600;
    padding: 2px 6px;
    border-radius: 4px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .badge-blue { background: var(--accent-dim); color: var(--accent); }
  .badge-green { background: var(--green-dim); color: var(--green); }
  .badge-pink { background: #2a1530; color: #d68ce8; }

  /* ── Main ───────────────────────────────────── */
  .main {
    padding: 32px 40px;
    max-width: 900px;
  }

  .page-title {
    font-family: var(--font-display);
    font-size: 32px;
    color: var(--text-primary);
    margin-bottom: 4px;
    letter-spacing: -0.5px;
  }

  .page-subtitle {
    color: var(--text-muted);
    font-size: 13px;
    margin-bottom: 32px;
  }

  /* ── Query input ────────────────────────────── */
  .query-section {
    margin-bottom: 28px;
  }

  .query-input-wrapper {
    position: relative;
    margin-bottom: 12px;
  }

  .query-input {
    width: 100%;
    background: var(--bg-input);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 16px 120px 16px 18px;
    color: var(--text-primary);
    font-family: var(--font-body);
    font-size: 15px;
    outline: none;
    transition: border-color 0.2s;
    resize: none;
  }
  .query-input:focus { border-color: var(--accent); }
  .query-input::placeholder { color: var(--text-muted); }

  .submit-btn {
    position: absolute;
    right: 8px;
    top: 50%;
    transform: translateY(-50%);
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: var(--radius);
    padding: 10px 20px;
    font-family: var(--font-body);
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.15s;
    letter-spacing: 0.3px;
  }
  .submit-btn:hover { opacity: 0.85; }
  .submit-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  .query-controls {
    display: flex;
    gap: 12px;
    align-items: center;
    flex-wrap: wrap;
  }

  .control-group {
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .control-label {
    font-size: 11px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    font-weight: 600;
  }

  .control-select {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 6px 10px;
    color: var(--text-primary);
    font-family: var(--font-body);
    font-size: 12px;
    outline: none;
    cursor: pointer;
  }

  .toggle-wrapper {
    display: flex;
    align-items: center;
    gap: 6px;
    cursor: pointer;
  }
  .toggle-track {
    width: 32px; height: 18px;
    border-radius: 9px;
    background: var(--border);
    position: relative;
    transition: background 0.2s;
  }
  .toggle-track.active { background: var(--accent); }
  .toggle-knob {
    width: 14px; height: 14px;
    border-radius: 50%;
    background: var(--text-primary);
    position: absolute;
    top: 2px; left: 2px;
    transition: left 0.2s;
  }
  .toggle-track.active .toggle-knob { left: 16px; }

  /* ── Status bar ─────────────────────────────── */
  .status-bar {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 14px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    margin-bottom: 20px;
    font-size: 12px;
    color: var(--text-secondary);
    animation: fadeIn 0.3s ease;
  }

  .status-spinner {
    width: 14px; height: 14px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes fadeIn { from { opacity:0; transform:translateY(-4px); } to { opacity:1; transform:translateY(0); } }

  /* ── Faithfulness gauge ─────────────────────── */
  .faith-section {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 20px;
    margin-bottom: 20px;
    animation: fadeIn 0.4s ease;
  }

  .faith-top-row {
    display: flex;
    align-items: baseline;
    gap: 12px;
    margin-bottom: 12px;
  }

  .faith-score-num {
    font-family: var(--font-display);
    font-size: 40px;
    letter-spacing: -2px;
    line-height: 1;
  }

  .faith-label-text {
    font-size: 12px;
    font-weight: 600;
    padding: 4px 10px;
    border-radius: 6px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .faith-flag {
    font-size: 11px;
    font-weight: 600;
    color: var(--red);
    background: var(--red-bg);
    padding: 4px 10px;
    border-radius: 6px;
    margin-left: auto;
  }

  .faith-bar-track {
    height: 6px;
    background: var(--bg-primary);
    border-radius: 3px;
    overflow: hidden;
    margin-bottom: 14px;
  }
  .faith-bar-value {
    height: 100%;
    border-radius: 3px;
    transition: width 0.8s cubic-bezier(0.22, 1, 0.36, 1);
  }

  .faith-stats-row {
    display: flex;
    gap: 20px;
    flex-wrap: wrap;
  }
  .faith-stat {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 11px;
    color: var(--text-secondary);
    font-family: var(--font-mono);
  }
  .faith-stat-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
  }

  /* ── Tabs ───────────────────────────────────── */
  .tabs-bar {
    display: flex;
    gap: 0;
    border-bottom: 1px solid var(--border);
    margin-bottom: 20px;
  }
  .tab-btn {
    background: none;
    border: none;
    padding: 10px 20px;
    color: var(--text-muted);
    font-family: var(--font-body);
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: color 0.15s, border-color 0.15s;
    letter-spacing: 0.3px;
  }
  .tab-btn:hover { color: var(--text-secondary); }
  .tab-btn.active {
    color: var(--accent);
    border-bottom-color: var(--accent);
  }

  .tab-panel { display: none; animation: fadeIn 0.25s ease; }
  .tab-panel.active { display: block; }

  /* ── Answer ─────────────────────────────────── */
  .answer-area {
    font-size: 14px;
    line-height: 1.75;
    color: var(--text-primary);
    white-space: pre-wrap;
  }
  .answer-area .chunk-ref {
    color: var(--accent);
    font-family: var(--font-mono);
    font-size: 11px;
    font-weight: 600;
  }
  .answer-meta-row {
    display: flex;
    gap: 8px;
    margin-bottom: 16px;
    flex-wrap: wrap;
  }
  .answer-meta-tag {
    font-size: 10px;
    font-weight: 600;
    padding: 3px 8px;
    border-radius: 4px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    background: var(--bg-primary);
    color: var(--text-muted);
    border: 1px solid var(--border);
  }

  /* ── Source cards ────────────────────────────── */
  .source-card {
    background: var(--bg-primary);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px;
    margin-bottom: 10px;
    transition: border-color 0.15s;
  }
  .source-card:hover { border-color: var(--border-active); }

  .source-top {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 6px;
  }
  .source-type-tag {
    font-size: 9px;
    font-weight: 700;
    padding: 2px 7px;
    border-radius: 4px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .source-type-tag.contract { background: #162040; color: #6c8cff; }
  .source-type-tag.case_law { background: #2a2010; color: #f0c246; }
  .source-type-tag.statute  { background: #102a18; color: #3dd68c; }
  .source-type-tag.unknown  { background: var(--bg-card); color: var(--text-muted); }

  .source-num {
    font-weight: 700;
    font-size: 13px;
    margin-left: 8px;
  }
  .source-score {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--text-muted);
  }
  .source-meta-line {
    font-size: 11px;
    color: var(--text-muted);
    margin-bottom: 8px;
  }
  .source-text {
    font-size: 12px;
    line-height: 1.6;
    color: var(--text-secondary);
    background: var(--bg-secondary);
    border-radius: 6px;
    padding: 10px 12px;
    max-height: 180px;
    overflow-y: auto;
    white-space: pre-wrap;
    font-family: var(--font-mono);
  }

  /* ── Claim cards ────────────────────────────── */
  .claim-card {
    border-radius: var(--radius);
    padding: 12px 14px;
    margin-bottom: 8px;
    border-left: 3px solid;
    font-size: 13px;
    line-height: 1.55;
  }
  .claim-card.grounded {
    background: var(--green-bg);
    border-color: var(--green);
    color: #b8f0d0;
  }
  .claim-card.ungrounded {
    background: var(--yellow-bg);
    border-color: var(--yellow);
    color: #f0e8b0;
  }
  .claim-card.contradicted {
    background: var(--red-bg);
    border-color: var(--red);
    color: #f0c0c0;
  }
  .claim-top {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 4px;
  }
  .claim-status {
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.6px;
  }
  .claim-prob {
    font-family: var(--font-mono);
    font-size: 10px;
    opacity: 0.7;
  }

  /* ── Empty / loading ────────────────────────── */
  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-muted);
  }
  .empty-state-icon {
    font-size: 40px;
    margin-bottom: 12px;
    opacity: 0.4;
  }
  .empty-state-text {
    font-size: 14px;
    margin-bottom: 4px;
  }
  .empty-state-hint {
    font-size: 12px;
    color: var(--text-muted);
    opacity: 0.6;
  }

  .cursor-blink {
    display: inline-block;
    width: 2px;
    height: 16px;
    background: var(--accent);
    margin-left: 2px;
    animation: blink 0.8s step-end infinite;
    vertical-align: text-bottom;
  }
  @keyframes blink { 50% { opacity: 0; } }

  /* ── Example queries ────────────────────────── */
  .examples-section {
    margin-top: 32px;
    padding-top: 24px;
    border-top: 1px solid var(--border);
  }
  .examples-title {
    font-size: 11px;
    font-weight: 700;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 10px;
  }
  .example-chips {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }
  .example-chip {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 7px 14px;
    font-size: 12px;
    color: var(--text-secondary);
    cursor: pointer;
    transition: border-color 0.15s, color 0.15s;
  }
  .example-chip:hover {
    border-color: var(--accent);
    color: var(--text-primary);
  }

  /* ── Documents panel ─────────────────────────── */
  .docs-panel {
    margin-top: 32px;
    padding-top: 24px;
    border-top: 1px solid var(--border);
  }
  .docs-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
  }
  .docs-title {
    font-size: 11px;
    font-weight: 700;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .dropzone {
    border: 2px dashed var(--border);
    border-radius: var(--radius-lg);
    padding: 28px 20px;
    text-align: center;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
    margin-bottom: 14px;
  }
  .dropzone:hover, .dropzone.drag-over {
    border-color: var(--accent);
    background: rgba(108, 140, 255, 0.04);
  }
  .dropzone-icon { font-size: 28px; margin-bottom: 6px; opacity: 0.5; }
  .dropzone-text { font-size: 13px; color: var(--text-secondary); }
  .dropzone-hint { font-size: 11px; color: var(--text-muted); margin-top: 4px; }
  .dropzone input[type="file"] { display: none; }

  .doc-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 12px;
    border-radius: var(--radius);
    background: var(--bg-card);
    margin-bottom: 6px;
    border: 1px solid var(--border);
  }
  .doc-item-info {
    display: flex;
    align-items: center;
    gap: 8px;
    min-width: 0;
  }
  .doc-icon {
    font-size: 16px;
    flex-shrink: 0;
  }
  .doc-name {
    font-size: 12px;
    font-weight: 500;
    color: var(--text-primary);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .doc-size {
    font-size: 10px;
    color: var(--text-muted);
    font-family: var(--font-mono);
    flex-shrink: 0;
  }
  .doc-delete-btn {
    background: none;
    border: none;
    color: var(--text-muted);
    cursor: pointer;
    font-size: 14px;
    padding: 2px 6px;
    border-radius: 4px;
    transition: color 0.15s, background 0.15s;
    flex-shrink: 0;
  }
  .doc-delete-btn:hover { color: var(--red); background: var(--red-bg); }

  .ingest-btn {
    width: 100%;
    padding: 10px;
    background: var(--green-dim);
    color: var(--green);
    border: 1px solid rgba(61, 214, 140, 0.2);
    border-radius: var(--radius);
    font-family: var(--font-body);
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.15s;
    margin-top: 8px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .ingest-btn:hover { opacity: 0.85; }
  .ingest-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  .upload-status {
    font-size: 11px;
    padding: 8px 12px;
    border-radius: var(--radius);
    margin-top: 8px;
    animation: fadeIn 0.3s ease;
  }
  .upload-status.success { background: var(--green-bg); color: var(--green); border: 1px solid rgba(61,214,140,0.15); }
  .upload-status.error { background: var(--red-bg); color: var(--red); border: 1px solid rgba(240,108,108,0.15); }
  .upload-status.info { background: var(--accent-dim); color: var(--accent); border: 1px solid rgba(108,140,255,0.15); }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

const API_BASE = "http://localhost:8000";

const DEFAULT_EXAMPLES = [
  "What are the key terms of this agreement?",
  "What obligations do the parties have?",
  "What are the termination conditions?",
];

// ── Faithfulness gauge ──────────────────────────────────────
function FaithGauge({ data }) {
  if (!data) return null;
  const pct = Math.round(data.score * 100);
  let color, label, bg;
  if (data.score >= 0.85) { color = "var(--green)"; label = "Highly Grounded"; bg = "var(--green-bg)"; }
  else if (data.score >= 0.7) { color = "#84cc16"; label = "Mostly Grounded"; bg = "#101a08"; }
  else if (data.score >= 0.5) { color = "var(--yellow)"; label = "Partially Grounded"; bg = "var(--yellow-bg)"; }
  else { color = "var(--red)"; label = "High Hallucination Risk"; bg = "var(--red-bg)"; }

  return (
    <div className="faith-section">
      <div className="faith-top-row">
        <span className="faith-score-num" style={{ color }}>{pct}%</span>
        <span className="faith-label-text" style={{ background: bg, color }}>{label}</span>
        {data.is_flagged && <span className="faith-flag">⚠ Review Carefully</span>}
      </div>
      <div className="faith-bar-track">
        <div className="faith-bar-value" style={{ width: `${pct}%`, background: color }} />
      </div>
      <div className="faith-stats-row">
        <span className="faith-stat">
          <span className="faith-stat-dot" style={{ background: "var(--green)" }} />{data.n_grounded} grounded
        </span>
        <span className="faith-stat">
          <span className="faith-stat-dot" style={{ background: "var(--yellow)" }} />{data.n_ungrounded} ungrounded
        </span>
        <span className="faith-stat">
          <span className="faith-stat-dot" style={{ background: "var(--red)" }} />{data.n_contradicted} contradicted
        </span>
        <span className="faith-stat">{data.n_claims} claims</span>
      </div>
    </div>
  );
}

// ── Source card ──────────────────────────────────────────────
function SourceCard({ chunk, index }) {
  const typeClass = ["contract","case_law","statute"].includes(chunk.doc_type) ? chunk.doc_type : "unknown";
  const scoreText = chunk.reranker_score
    ? `re-rank: ${chunk.reranker_score} | rrf: ${chunk.rrf_score}`
    : `rrf: ${chunk.rrf_score}`;
  const preview = chunk.text.length > 400 ? chunk.text.slice(0, 400) + "..." : chunk.text;

  return (
    <div className="source-card">
      <div className="source-top">
        <div>
          <span className={`source-type-tag ${typeClass}`}>{chunk.doc_type || "doc"}</span>
          <span className="source-num">Chunk {index + 1}</span>
        </div>
        <span className="source-score">{scoreText}</span>
      </div>
      <div className="source-meta-line">
        {chunk.source_file} &middot; {chunk.section || "—"} &middot; page {chunk.page_num || "—"} &middot; {chunk.token_count} tok
      </div>
      <div className="source-text">{preview}</div>
    </div>
  );
}

// ── Claim card ──────────────────────────────────────────────
function ClaimCard({ claim, index }) {
  let cls, icon, status;
  if (claim.is_grounded) { cls = "grounded"; icon = "✓"; status = "Grounded"; }
  else if (claim.label === "contradiction") { cls = "contradicted"; icon = "✗"; status = "Contradicted"; }
  else { cls = "ungrounded"; icon = "?"; status = "Ungrounded"; }

  return (
    <div className={`claim-card ${cls}`}>
      <div className="claim-top">
        <span className="claim-status">{icon} Claim {index + 1} — {status}</span>
        <span className="claim-prob">entailment: {claim.entailment_prob}</span>
      </div>
      <div>{claim.claim}</div>
    </div>
  );
}

// ── History item ────────────────────────────────────────────
function HistoryItem({ item, onClick }) {
  const scoreColor = item.faithfulness_score >= 0.7 ? "var(--green)"
    : item.faithfulness_score >= 0.5 ? "var(--yellow)" : "var(--red)";
  const pct = Math.round(item.faithfulness_score * 100);
  const time = new Date(item.timestamp).toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });

  return (
    <div className="history-item" onClick={() => onClick(item.question)}>
      <div className="history-question">{item.question}</div>
      <div className="history-meta">
        <span className="history-score">
          <span className="history-score-dot" style={{ background: scoreColor }} />
          {pct}%
        </span>
        <span>{Math.round(item.latency_ms)}ms</span>
        <span>{time}</span>
      </div>
    </div>
  );
}

// ── Documents panel ─────────────────────────────────────────
function DocumentsPanel({ onIngestComplete }) {
  const [docs, setDocs] = useState([]);
  const [indexBuilt, setIndexBuilt] = useState(false);
  const [uploading, setUploading] = useState(false);
  const [ingesting, setIngesting] = useState(false);
  const [statusMsg, setStatusMsg] = useState(null); // {type, text}
  const [dragOver, setDragOver] = useState(false);
  const fileInputRef = useRef(null);

  const loadDocs = () => {
    fetch(`${API_BASE}/api/documents`)
      .then(r => r.json())
      .then(d => { setDocs(d.documents || []); setIndexBuilt(d.index_built); })
      .catch(() => {});
  };

  useEffect(() => { loadDocs(); }, []);

  const handleFiles = async (files) => {
    if (!files.length) return;
    setUploading(true);
    setStatusMsg(null);

    const formData = new FormData();
    for (const f of files) formData.append("files", f);

    try {
      const resp = await fetch(`${API_BASE}/api/documents/upload-multiple`, {
        method: "POST", body: formData,
      });
      const data = await resp.json();
      const ok = data.uploaded || 0;
      setStatusMsg({ type: "success", text: `Uploaded ${ok} file${ok !== 1 ? "s" : ""}. Click "Build Index" to make them searchable.` });
      loadDocs();
    } catch (e) {
      setStatusMsg({ type: "error", text: `Upload failed: ${e.message}` });
    }
    setUploading(false);
  };

  const handleDrop = (e) => {
    e.preventDefault();
    setDragOver(false);
    handleFiles(e.dataTransfer.files);
  };

  const handleDelete = async (filename) => {
    try {
      await fetch(`${API_BASE}/api/documents/${encodeURIComponent(filename)}`, { method: "DELETE" });
      loadDocs();
    } catch (e) {}
  };

  const handleIngest = async () => {
    setIngesting(true);
    setStatusMsg({ type: "info", text: "Building index... This may take a minute." });
    try {
      const resp = await fetch(`${API_BASE}/api/documents/ingest?reset=true`, { method: "POST" });
      const data = await resp.json();
      if (data.status === "ok") {
        setStatusMsg({ type: "success", text: `Index built: ${data.chunks} chunks. Ready to search!` });
        setIndexBuilt(true);
        if (onIngestComplete) onIngestComplete(data.suggestions || []);
      } else {
        setStatusMsg({ type: "error", text: data.message });
      }
    } catch (e) {
      setStatusMsg({ type: "error", text: `Ingestion failed: ${e.message}` });
    }
    setIngesting(false);
  };

  const docIcon = (type) => ({ pdf: "📄", html: "🌐", htm: "🌐", txt: "📝" }[type] || "📎");

  return (
    <div className="docs-panel">
      <div className="docs-header">
        <span className="docs-title">Documents ({docs.length})</span>
      </div>

      {/* Dropzone */}
      <div
        className={`dropzone ${dragOver ? "drag-over" : ""}`}
        onClick={() => fileInputRef.current?.click()}
        onDragOver={(e) => { e.preventDefault(); setDragOver(true); }}
        onDragLeave={() => setDragOver(false)}
        onDrop={handleDrop}
      >
        <div className="dropzone-icon">{uploading ? "⏳" : "📁"}</div>
        <div className="dropzone-text">
          {uploading ? "Uploading..." : "Drop files here or click to browse"}
        </div>
        <div className="dropzone-hint">PDF, HTML, TXT</div>
        <input
          ref={fileInputRef}
          type="file"
          multiple
          accept=".pdf,.html,.htm,.txt"
          onChange={(e) => handleFiles(e.target.files)}
        />
      </div>

      {/* File list */}
      {docs.map((doc, i) => (
        <div key={i} className="doc-item">
          <div className="doc-item-info">
            <span className="doc-icon">{docIcon(doc.type)}</span>
            <span className="doc-name" title={doc.filename}>{doc.filename}</span>
          </div>
          <span className="doc-size">{doc.size_kb}kb</span>
          <button className="doc-delete-btn" onClick={() => handleDelete(doc.filename)} title="Delete">✕</button>
        </div>
      ))}

      {/* Ingest button */}
      {docs.length > 0 && (
        <button className="ingest-btn" onClick={handleIngest} disabled={ingesting}>
          {ingesting ? "Building index..." : "⚡ Build Index"}
        </button>
      )}

      {/* Status message */}
      {statusMsg && (
        <div className={`upload-status ${statusMsg.type}`}>{statusMsg.text}</div>
      )}
    </div>
  );
}

// ── Main App ────────────────────────────────────────────────
function App() {
  const [query, setQuery] = useState("");
  const [loading, setLoading] = useState(false);
  const [status, setStatus] = useState("");
  const [answer, setAnswer] = useState("");
  const [chunks, setChunks] = useState([]);
  const [claims, setClaims] = useState([]);
  const [faith, setFaith] = useState(null);
  const [meta, setMeta] = useState(null);
  const [activeTab, setActiveTab] = useState("answer");
  const [history, setHistory] = useState([]);
  const [docType, setDocType] = useState("All");
  const [topK, setTopK] = useState(5);
  const [useReranker, setUseReranker] = useState(true);
  const [suggestions, setSuggestions] = useState(DEFAULT_EXAMPLES);
  const [hasIndex, setHasIndex] = useState(false);
  const inputRef = useRef(null);

  // Load history + suggestions on mount
  useEffect(() => {
    fetch(`${API_BASE}/api/history?limit=20`)
      .then(r => r.json())
      .then(d => setHistory(d.history || []))
      .catch(() => {});
    _refreshSuggestions();
  }, []);

const _refreshSuggestions = () => {
    fetch(`${API_BASE}/api/suggestions`)
      .then(r => r.json())
      .then(d => {
        if (d.suggestions && d.suggestions.length > 0) {
          setSuggestions(d.suggestions);
        }
        setHasIndex(d.has_index || false);
      })
      .catch(() => {});
  };
  const submitQuery = useCallback(async (q) => {
    const question = q || query;
    if (!question.trim() || loading) return;

    setLoading(true);
    setStatus("Connecting...");
    setAnswer("");
    setChunks([]);
    setClaims([]);
    setFaith(null);
    setMeta(null);
    setActiveTab("answer");

    try {
      const resp = await fetch(`${API_BASE}/api/query/stream`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          question, doc_type_filter: docType,
          top_k: topK, use_reranker: useReranker,
        }),
      });

      const reader = resp.body.getReader();
      const decoder = new TextDecoder();
      let buffer = "";
      let fullAnswer = "";

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;

        buffer += decoder.decode(value, { stream: true });
        const lines = buffer.split("\n");
        buffer = lines.pop() || "";

        for (const line of lines) {
          if (!line.startsWith("data: ")) continue;
          try {
            const event = JSON.parse(line.slice(6));

            switch (event.type) {
              case "status":
                setStatus(event.message);
                break;
              case "chunks":
                setChunks(event.data);
                break;
              case "answer_start":
                setStatus("Generating answer...");
                break;
              case "answer_token":
                fullAnswer += event.token;
                setAnswer(fullAnswer);
                break;
              case "claims":
                setClaims(event.data);
                break;
              case "faithfulness":
                setFaith(event.data);
                setStatus("");
                break;
              case "done":
                setMeta(event.data);
                setLoading(false);
                // Refresh history
                fetch(`${API_BASE}/api/history?limit=20`)
                  .then(r => r.json())
                  .then(d => setHistory(d.history || []))
                  .catch(() => {});
                break;
              case "error":
                setStatus(`Error: ${event.message}`);
                setLoading(false);
                break;
            }
          } catch (e) { /* skip malformed */ }
        }
      }
    } catch (err) {
      setStatus(`Connection failed: ${err.message}`);
      setLoading(false);
    }
  }, [query, docType, topK, useReranker, loading]);

  const handleKeyDown = (e) => {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      submitQuery();
    }
  };

  const handleExampleClick = (q) => {
    setQuery(q);
    submitQuery(q);
  };

  const handleHistoryClick = (q) => {
    setQuery(q);
    submitQuery(q);
  };

  const hasResult = answer || chunks.length > 0;

  return (
    <div className="app-layout">
      {/* ── Sidebar ──────────────────────────── */}
      <aside className="sidebar">
        <div className="sidebar-logo">⚖ Legal RAG</div>
        <div className="sidebar-sub">Hallucination-Aware Search</div>

        <div className="sidebar-section-title">Query History</div>
        {history.length === 0 ? (
          <div className="history-empty">No queries yet</div>
        ) : (
          history.map((item, i) => (
            <HistoryItem key={i} item={item} onClick={handleHistoryClick} />
          ))
        )}

        <DocumentsPanel onIngestComplete={(newSuggestions) => {
          if (newSuggestions && newSuggestions.length > 0) setSuggestions(newSuggestions);
          _refreshSuggestions();
          setHasIndex(true);
        }} />

        <div className="sidebar-footer">
          <div className="tech-badges">
            <span className="tech-badge badge-blue">Hybrid + RRF</span>
            <span className="tech-badge badge-green">Cross-Encoder</span>
            <span className="tech-badge badge-pink">NLI Detection</span>
          </div>
          <div style={{ marginTop: 8 }}>
            FastAPI + React &middot; FAISS &middot; DeBERTa
          </div>
        </div>
      </aside>

      {/* ── Main ─────────────────────────────── */}
      <main className="main">
        <h1 className="page-title">Legal Document Search</h1>
        <p className="page-subtitle">
          Ask questions grounded in retrieved context with real-time hallucination detection
        </p>

        {/* Query input */}
        <div className="query-section">
          <div className="query-input-wrapper">
            <textarea
              ref={inputRef}
              className="query-input"
              rows={1}
              placeholder="Ask a question about your legal documents..."
              value={query}
              onChange={(e) => setQuery(e.target.value)}
              onKeyDown={handleKeyDown}
            />
            <button
              className="submit-btn"
              onClick={() => submitQuery()}
              disabled={loading || !query.trim()}
            >
              {loading ? "Analyzing..." : "Search"}
            </button>
          </div>

          <div className="query-controls">
            <div className="control-group">
              <span className="control-label">Type</span>
              <select className="control-select" value={docType} onChange={e => setDocType(e.target.value)}>
                <option>All</option>
                <option>Contract</option>
                <option>Case law</option>
                <option>Statute</option>
              </select>
            </div>
            <div className="control-group">
              <span className="control-label">Chunks</span>
              <select className="control-select" value={topK} onChange={e => setTopK(Number(e.target.value))}>
                {[2,3,4,5,6,7,8,10].map(n => <option key={n} value={n}>{n}</option>)}
              </select>
            </div>
            <div className="control-group">
              <span className="control-label">Re-ranker</span>
              <div className="toggle-wrapper" onClick={() => setUseReranker(!useReranker)}>
                <div className={`toggle-track ${useReranker ? "active" : ""}`}>
                  <div className="toggle-knob" />
                </div>
              </div>
            </div>
          </div>
        </div>

        {/* Status */}
        {status && (
          <div className="status-bar">
            {loading && <div className="status-spinner" />}
            {status}
          </div>
        )}

        {/* Faithfulness gauge */}
        <FaithGauge data={faith} />

        {/* Results */}
        {hasResult && (
          <>
            <div className="tabs-bar">
              {[
                ["answer", "Answer"],
                ["sources", `Sources (${chunks.length})`],
                ["claims", `Claims (${claims.length})`],
              ].map(([key, label]) => (
                <button
                  key={key}
                  className={`tab-btn ${activeTab === key ? "active" : ""}`}
                  onClick={() => setActiveTab(key)}
                >
                  {label}
                </button>
              ))}
            </div>

            <div className={`tab-panel ${activeTab === "answer" ? "active" : ""}`}>
              {meta && (
                <div className="answer-meta-row">
                  <span className="answer-meta-tag">{meta.model}</span>
                  <span className="answer-meta-tag">{meta.retrieval_method}</span>
                  <span className="answer-meta-tag">{Math.round(meta.latency_ms)}ms</span>
                </div>
              )}
              <div className="answer-area">
                {answer}
                {loading && <span className="cursor-blink" />}
              </div>
            </div>

            <div className={`tab-panel ${activeTab === "sources" ? "active" : ""}`}>
              {chunks.map((c, i) => <SourceCard key={i} chunk={c} index={i} />)}
            </div>

            <div className={`tab-panel ${activeTab === "claims" ? "active" : ""}`}>
              {claims.length === 0 && !loading ? (
                <div style={{ color: "var(--text-muted)", padding: 20 }}>
                  No claims extracted yet.
                </div>
              ) : (
                claims.map((c, i) => <ClaimCard key={i} claim={c} index={i} />)
              )}
            </div>
          </>
        )}

        {/* Empty state — different for no index vs ready */}
        {!hasResult && !loading && (
          <div className="empty-state">
            {!hasIndex ? (
              <>
                <div className="empty-state-icon">📄</div>
                <div className="empty-state-text">Upload documents to get started</div>
                <div className="empty-state-hint">
                  Drop your legal PDFs, contracts, or agreements in the sidebar, then click "Build Index"
                </div>
              </>
            ) : (
              <>
                <div className="empty-state-icon">⚖</div>
                <div className="empty-state-text">Ask a question about your documents</div>
                <div className="empty-state-hint">
                  Answers are grounded in retrieved context and verified for hallucinations
                </div>
              </>
            )}
          </div>
        )}

        {/* Dynamic suggestions from ingested documents */}
        {!hasResult && suggestions.length > 0 && (
          <div className="examples-section">
            <div className="examples-title">
              {hasIndex ? "Suggested questions from your documents" : "Try these"}
            </div>
            <div className="example-chips">
              {suggestions.map((q, i) => (
                <div key={i} className="example-chip" onClick={() => handleExampleClick(q)}>
                  {q}
                </div>
              ))}
            </div>
          </div>
        )}

        {/* New session button */}
        {hasResult && (
          <div style={{ marginTop: 24, textAlign: "center" }}>
            <button
              style={{
                background: "var(--bg-card)", border: "1px solid var(--border)",
                borderRadius: "var(--radius)", padding: "8px 20px",
                color: "var(--text-secondary)", fontFamily: "var(--font-body)",
                fontSize: "12px", fontWeight: 600, cursor: "pointer",
                letterSpacing: "0.3px",
              }}
              onClick={() => {
                setAnswer(""); setChunks([]); setClaims([]); setFaith(null);
                setMeta(null); setQuery(""); setStatus("");
              }}
            >
              ← New Query
            </button>
          </div>
        )}
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
